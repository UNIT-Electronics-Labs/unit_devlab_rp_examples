<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="520" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">UART Hello World - configuracion de pines y ruta del mensaje</text>

  <!-- Fila superior: 3 llamadas BL -->
  <rect x="40" y="60" width="250" height="90" rx="6" fill="#dbe9ff" stroke="#3b6fb5" stroke-width="1.5"/>
  <text x="165" y="85" text-anchor="middle" font-size="12" font-weight="bold">gpio_set_function(0, UART)</text>
  <text x="165" y="103" text-anchor="middle" font-size="10">GPIO0 -> TX (F2)</text>
  <text x="165" y="120" text-anchor="middle" font-size="10">IO_BANK0_GPIO0_CTRL</text>
  <text x="165" y="137" text-anchor="middle" font-size="10">FUNCSEL = 2</text>

  <rect x="325" y="60" width="250" height="90" rx="6" fill="#dbe9ff" stroke="#3b6fb5" stroke-width="1.5"/>
  <text x="450" y="85" text-anchor="middle" font-size="12" font-weight="bold">gpio_set_function(1, UART)</text>
  <text x="450" y="103" text-anchor="middle" font-size="10">GPIO1 -> RX (F2)</text>
  <text x="450" y="120" text-anchor="middle" font-size="10">IO_BANK0_GPIO1_CTRL</text>
  <text x="450" y="137" text-anchor="middle" font-size="10">FUNCSEL = 2</text>

  <rect x="610" y="60" width="250" height="90" rx="6" fill="#dbe9ff" stroke="#3b6fb5" stroke-width="1.5"/>
  <text x="735" y="85" text-anchor="middle" font-size="12" font-weight="bold">uart_init(uart0, 115200)</text>
  <text x="735" y="103" text-anchor="middle" font-size="10">UART0_BASE 0x40034000</text>
  <text x="735" y="120" text-anchor="middle" font-size="10">Calcula IBRD / FBRD</text>
  <text x="735" y="137" text-anchor="middle" font-size="10">Habilita TXE/RXE en UARTCR</text>

  <line x1="290" y1="105" x2="320" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="575" y1="105" x2="605" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Envio del mensaje -->
  <rect x="200" y="185" width="500" height="80" rx="6" fill="#fff6da" stroke="#c9a227" stroke-width="1.5"/>
  <text x="450" y="212" text-anchor="middle" font-size="12" font-weight="bold">uart_puts(uart0, mensaje)</text>
  <text x="450" y="232" text-anchor="middle" font-size="10">Recorre el buffer .asciz byte a byte</text>
  <text x="450" y="250" text-anchor="middle" font-size="10">Escribe cada caracter en UARTDR (0x40034000 + 0x000)</text>

  <line x1="735" y1="150" x2="735" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="735" y1="170" x2="450" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="450" y1="170" x2="450" y2="183" stroke="#333" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Trama serial -->
  <text x="450" y="300" text-anchor="middle" font-size="13" font-weight="bold">Trama transmitida por el pin TX (GPIO0), 8N1 a 115200 baudios</text>

  <g transform="translate(120,330)">
    <rect x="0"   y="0" width="40" height="40" fill="#ffe0e0" stroke="#a33"/>
    <text x="20" y="25" text-anchor="middle" font-size="10">START</text>

    <rect x="40" y="0" width="40" height="40" fill="#e0f0ff" stroke="#3b6fb5"/>
    <text x="60" y="25" text-anchor="middle" font-size="9">D0</text>
    <rect x="80" y="0" width="40" height="40" fill="#e0f0ff" stroke="#3b6fb5"/>
    <text x="100" y="25" text-anchor="middle" font-size="9">D1</text>
    <rect x="120" y="0" width="40" height="40" fill="#e0f0ff" stroke="#3b6fb5"/>
    <text x="140" y="25" text-anchor="middle" font-size="9">D2</text>
    <rect x="160" y="0" width="40" height="40" fill="#e0f0ff" stroke="#3b6fb5"/>
    <text x="180" y="25" text-anchor="middle" font-size="9">D3</text>
    <rect x="200" y="0" width="40" height="40" fill="#e0f0ff" stroke="#3b6fb5"/>
    <text x="220" y="25" text-anchor="middle" font-size="9">D4</text>
    <rect x="240" y="0" width="40" height="40" fill="#e0f0ff" stroke="#3b6fb5"/>
    <text x="260" y="25" text-anchor="middle" font-size="9">D5</text>
    <rect x="280" y="0" width="40" height="40" fill="#e0f0ff" stroke="#3b6fb5"/>
    <text x="300" y="25" text-anchor="middle" font-size="9">D6</text>
    <rect x="320" y="0" width="40" height="40" fill="#e0f0ff" stroke="#3b6fb5"/>
    <text x="340" y="25" text-anchor="middle" font-size="9">D7</text>

    <rect x="360" y="0" width="40" height="40" fill="#e0ffe0" stroke="#3a3"/>
    <text x="380" y="25" text-anchor="middle" font-size="9">STOP</text>

    <text x="200" y="-10" text-anchor="middle" font-size="10" fill="#555">1 byte = 1 caracter del mensaje</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-size="11">Tiempo por byte = 10 bits x (1 / 115200 s) ~ 86.8 us</text>
  <text x="450" y="460" text-anchor="middle" font-size="11">Mensaje "Hello World desde UART\n" = 24 caracteres ~ 24 x 86.8 us ~ 2.08 ms de transmision total</text>

  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#777">uart0 es un puntero (uart_inst_t * const) definido por el SDK; se dereferencia antes de pasarlo como argumento</text>
</svg>
