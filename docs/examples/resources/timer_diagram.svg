<svg viewBox="0 0 860 790" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="790" fill="#FFFFFF"/>

  <text x="430" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#0F172A">Flujo de configuracion del temporizador repetitivo</text>

  <!-- Box 1: Inicio -->
  <rect x="350" y="30" width="160" height="36" rx="18" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="53" text-anchor="middle" font-size="13" fill="#1E293B">Inicio</text>
  <line x1="430" y1="66" x2="430" y2="86" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <rect x="150" y="86" width="560" height="40" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="110" text-anchor="middle" font-size="12.5" fill="#1E293B">gpio_init(LED_PIN); gpio_set_dir(LED_PIN, GPIO_OUT);</text>
  <line x1="430" y1="126" x2="430" y2="146" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <rect x="150" y="146" width="560" height="40" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="170" text-anchor="middle" font-size="12.5" fill="#1E293B">struct repeating_timer timer;</text>
  <line x1="430" y1="186" x2="430" y2="206" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 4 -->
  <rect x="150" y="206" width="560" height="56" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="228" text-anchor="middle" font-size="12.5" fill="#1E293B">add_repeating_timer_ms(-INTERVALO_MS,</text>
  <text x="430" y="248" text-anchor="middle" font-size="12.5" fill="#1E293B">repetir_callback, NULL, &amp;timer);</text>

  <!-- fork arrows -->
  <line x1="430" y1="262" x2="430" y2="278" stroke="#475569" stroke-width="1.5"/>
  <path d="M 430 278 L 290 296" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 430 278 L 575 296" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 5: main loop -->
  <rect x="150" y="298" width="270" height="56" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="285" y="320" text-anchor="middle" font-size="12.5" fill="#1E293B">while (1)</text>
  <text x="285" y="339" text-anchor="middle" font-size="12.5" fill="#1E293B">tight_loop_contents();</text>
  <text x="285" y="372" text-anchor="middle" font-size="11" fill="#475569">nucleo libre para otro codigo</text>

  <!-- Box 6: callback -->
  <rect x="440" y="298" width="270" height="56" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="575" y="320" text-anchor="middle" font-size="12.5" fill="#1E293B">repetir_callback():</text>
  <text x="575" y="339" text-anchor="middle" font-size="12.5" fill="#1E293B">invierte LED; return true;</text>
  <text x="575" y="372" text-anchor="middle" font-size="11" fill="#475569">interrupcion de hardware, cada INTERVALO_MS</text>

  <!-- self loop on callback -->
  <path d="M 710 310 C 760 305, 760 335, 710 335" fill="none" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <line x1="40" y1="400" x2="820" y2="400" stroke="#CBD5E1" stroke-width="1"/>

  <text x="430" y="425" text-anchor="middle" font-size="16" font-weight="bold" fill="#0F172A">Comportamiento del contador y del LED en el tiempo</text>

  <!-- axes -->
  <line x1="80" y1="600" x2="80" y2="470" stroke="#334155" stroke-width="1.2"/>
  <line x1="75" y1="600" x2="790" y2="600" stroke="#334155" stroke-width="1.2"/>
  <text x="795" y="604" font-size="12" fill="#334155">tiempo</text>
  <text x="90" y="465" font-size="12" fill="#334155">time_us_64() (nunca reinicia en la practica)</text>

  <!-- counter rising line -->
  <polyline points="80,600 780,480" fill="none" stroke="#2563EB" stroke-width="2"/>
  <circle cx="80" cy="600" r="3" fill="#2563EB"/>
  <circle cx="230" cy="574.3" r="3" fill="#2563EB"/>
  <circle cx="380" cy="548.6" r="3" fill="#2563EB"/>
  <circle cx="530" cy="522.9" r="3" fill="#2563EB"/>
  <circle cx="680" cy="497.1" r="3" fill="#2563EB"/>

  <!-- guide lines down to LED panel -->
  <line x1="80" y1="600" x2="80" y2="650" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="230" y1="574.3" x2="230" y2="650" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="380" y1="548.6" x2="380" y2="650" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="530" y1="522.9" x2="530" y2="650" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="680" y1="497.1" x2="680" y2="650" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- LED square wave -->
  <text x="90" y="645" font-size="12" fill="#334155">estado del LED</text>
  <polyline points="80,650 230,650 230,685 380,685 380,650 530,650 530,685 680,685 680,650 780,650"
            fill="none" stroke="#16A34A" stroke-width="2.2"/>

  <!-- interval brace -->
  <line x1="80" y1="702" x2="230" y2="702" stroke="#475569" stroke-width="1"/>
  <line x1="80" y1="697" x2="80" y2="707" stroke="#475569" stroke-width="1"/>
  <line x1="230" y1="697" x2="230" y2="707" stroke="#475569" stroke-width="1"/>
  <text x="155" y="720" text-anchor="middle" font-size="11.5" fill="#475569">INTERVALO_MS = 500 ms (un disparo del temporizador)</text>

  <text x="430" y="752" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F172A">500 ms = 500 000 µs  →  objetivo_siguiente = time_us_64() + 500 000</text>
  <text x="430" y="772" text-anchor="middle" font-size="11.5" fill="#334155">contador de 64 bits a 1 MHz → alcance ≈ 584 942 años (uno de 32 bits se desbordaria en ≈ 71.6 minutos)</text>
</svg>
