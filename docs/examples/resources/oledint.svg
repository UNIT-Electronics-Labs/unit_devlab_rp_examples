<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="620" fill="#FFFFFF"/>

  <text x="430" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#0F172A">Flujo de la aplicacion: sensor interno + display OLED</text>

  <!-- Box 1 -->
  <rect x="350" y="35" width="160" height="36" rx="18" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="58" text-anchor="middle" font-size="13" fill="#1E293B">Inicio</text>
  <line x1="430" y1="71" x2="430" y2="86" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <rect x="150" y="86" width="560" height="40" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="110" text-anchor="middle" font-size="12.5" fill="#1E293B">Configurar ADC (canal 4) e I2C0 (SDA/SCL, pull-ups)</text>
  <line x1="430" y1="126" x2="430" y2="141" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <rect x="150" y="141" width="560" height="40" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="165" text-anchor="middle" font-size="12.5" fill="#1E293B">ssd1306_init(&amp;display, ...) — inicializa el controlador del OLED</text>
  <line x1="430" y1="181" x2="430" y2="196" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Box 4 -->
  <rect x="150" y="196" width="560" height="52" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="218" text-anchor="middle" font-size="12.5" fill="#1E293B">Dibujar pantalla de bienvenida en el buffer</text>
  <text x="430" y="236" text-anchor="middle" font-size="12.5" fill="#1E293B">ssd1306_show() — envia el buffer completo por I2C</text>

  <line x1="430" y1="248" x2="430" y2="266" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Loop boxes -->
  <rect x="150" y="266" width="560" height="40" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="430" y="290" text-anchor="middle" font-size="12.5" fill="#1E293B">adc_read() → convertir a voltaje → calcular temperatura</text>
  <line x1="430" y1="306" x2="430" y2="321" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="150" y="321" width="560" height="40" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="430" y="345" text-anchor="middle" font-size="12.5" fill="#1E293B">ssd1306_clear(&amp;display) — borra el buffer en memoria (no la pantalla aun)</text>
  <line x1="430" y1="361" x2="430" y2="376" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="150" y="376" width="560" height="40" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="430" y="400" text-anchor="middle" font-size="12.5" fill="#1E293B">ssd1306_draw_string(...) x3 — escribe texto y linea en el buffer</text>
  <line x1="430" y1="416" x2="430" y2="431" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="150" y="431" width="560" height="40" rx="8" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <text x="430" y="455" text-anchor="middle" font-size="12.5" fill="#1E293B">ssd1306_show(&amp;display) — envia el buffer completo por I2C</text>
  <line x1="430" y1="471" x2="430" y2="486" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="150" y="486" width="560" height="36" rx="8" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <text x="430" y="508" text-anchor="middle" font-size="12.5" fill="#1E293B">sleep_ms(500)</text>

  <path d="M 40 286 C 10 286, 10 500, 40 500" fill="none" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="20" y="393" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90 20 393)">repite</text>

  <text x="430" y="555" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0F172A">El buffer vive en RAM del RP2040; el OLED solo se actualiza al llamar ssd1306_show()</text>
  <text x="430" y="577" text-anchor="middle" font-size="11.5" fill="#334155">clear() y draw_string() modifican memoria local — ningun dato viaja por I2C hasta el show() final</text>
</svg>
