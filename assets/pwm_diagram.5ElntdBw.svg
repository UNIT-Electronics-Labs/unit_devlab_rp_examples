<svg viewBox="0 0 860 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="780" fill="#FFFFFF"/>

  <text x="430" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#0F172A">Flujo de configuracion del periferico PWM</text>

  <!-- Box 1: Inicio -->
  <rect x="350" y="30" width="160" height="36" rx="18" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="53" text-anchor="middle" font-size="13" fill="#1E293B">Inicio</text>
  <line x1="430" y1="66" x2="430" y2="86" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <rect x="150" y="86" width="560" height="40" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="110" text-anchor="middle" font-size="12.5" fill="#1E293B">gpio_set_function(LED_PIN, GPIO_FUNC_PWM)</text>
  <line x1="430" y1="126" x2="430" y2="146" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <rect x="150" y="146" width="560" height="56" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="168" text-anchor="middle" font-size="12.5" fill="#1E293B">slice = pwm_gpio_to_slice_num(LED_PIN)</text>
  <text x="430" y="188" text-anchor="middle" font-size="12.5" fill="#1E293B">canal = pwm_gpio_to_channel(LED_PIN)</text>
  <line x1="430" y1="202" x2="430" y2="222" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 4 -->
  <rect x="150" y="222" width="560" height="60" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="246" text-anchor="middle" font-size="12.5" fill="#1E293B">config = pwm_get_default_config()</text>
  <text x="430" y="266" text-anchor="middle" font-size="12.5" fill="#1E293B">set clkdiv, wrap, phase_correct, polaridad</text>
  <line x1="430" y1="282" x2="430" y2="302" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 5 -->
  <rect x="150" y="302" width="560" height="54" rx="8" fill="#EAF2FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="324" text-anchor="middle" font-size="12.5" fill="#1E293B">pwm_init(slice, &amp;config, true)</text>
  <text x="430" y="343" text-anchor="middle" font-size="12.5" fill="#1E293B">arranca el contador de inmediato</text>
  <line x1="430" y1="356" x2="430" y2="376" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 6 -->
  <rect x="150" y="376" width="560" height="54" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="430" y="398" text-anchor="middle" font-size="12.5" fill="#1E293B">while (1) pwm_set_chan_level(slice, canal, nivel)</text>
  <text x="430" y="417" text-anchor="middle" font-size="12.5" fill="#1E293B">actualiza el ciclo de trabajo en cada iteracion</text>

  <!-- loop arrow -->
  <path d="M 710 388 C 780 388, 780 418, 710 418" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="793" y="407" text-anchor="middle" font-size="11" fill="#475569">repite</text>

  <line x1="40" y1="450" x2="820" y2="450" stroke="#CBD5E1" stroke-width="1"/>

  <text x="430" y="475" text-anchor="middle" font-size="16" font-weight="bold" fill="#0F172A">Comportamiento del contador y de la salida</text>

  <!-- axes -->
  <line x1="80" y1="620" x2="80" y2="495" stroke="#334155" stroke-width="1.2"/>
  <line x1="75" y1="620" x2="790" y2="620" stroke="#334155" stroke-width="1.2"/>
  <text x="795" y="624" font-size="12" fill="#334155">tiempo</text>
  <text x="55" y="624" font-size="11" fill="#334155" text-anchor="end">0</text>
  <text x="55" y="509" font-size="11" fill="#334155" text-anchor="end">wrap</text>
  <text x="90" y="492" font-size="12" fill="#334155">contador (0 → wrap)</text>

  <!-- ramp -->
  <polyline points="80,610 380,505 380,610 680,505 680,610 780,578"
            fill="none" stroke="#2563EB" stroke-width="2"/>

  <!-- threshold dashed line -->
  <line x1="80" y1="545" x2="780" y2="545" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="700" y="539" font-size="11.5" fill="#DC2626">nivel (umbral de comparacion)</text>

  <!-- alignment guides -->
  <line x1="265.7" y1="610" x2="265.7" y2="660" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="380" y1="610" x2="380" y2="660" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="565.7" y1="610" x2="565.7" y2="660" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="680" y1="610" x2="680" y2="660" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- output square wave -->
  <text x="90" y="650" font-size="12" fill="#334155">salida PWM</text>
  <polyline points="80,660 265.7,660 265.7,695 380,695 380,660 565.7,660 565.7,695 680,695 680,660 780,660"
            fill="none" stroke="#16A34A" stroke-width="2.2"/>

  <!-- period brace -->
  <line x1="80" y1="712" x2="380" y2="712" stroke="#475569" stroke-width="1"/>
  <line x1="80" y1="707" x2="80" y2="717" stroke="#475569" stroke-width="1"/>
  <line x1="380" y1="707" x2="380" y2="717" stroke="#475569" stroke-width="1"/>
  <text x="230" y="730" text-anchor="middle" font-size="11.5" fill="#475569">periodo = (wrap + 1) × clkdiv ciclos de clk_sys</text>

  <!-- formula box -->
  <rect x="130" y="742" width="600" height="1" fill="none"/>
  <text x="430" y="752" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F172A">f_PWM = clk_sys / (clkdiv × (wrap + 1))</text>
  <text x="430" y="772" text-anchor="middle" font-size="12" fill="#334155">clkdiv = 100, wrap = 255 → 125 MHz / (100 × 256) ≈ 4.88 kHz</text>
</svg>
